<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="/SCSS/common.css" />
    <link rel="stylesheet" href="CustomPanel.css" />

    <script type="text/javascript" src="/JS/coherent.js"></script>
    <script type="text/javascript" src="/JS/common.js"></script>
    <script type="text/javascript" src="/JS/dataStorage.js"></script>
    <script type="text/javascript" src="/JS/buttons.js"></script>
    <script type="text/javascript" src="/JS/Services/ToolBarPanels.js"></script>
    <script type="text/javascript" src="/Pages/VCockpit/Instruments/Shared/BaseInstrument.js"></script>

    <link rel="import" href="/templates/ingameUi/ingameUi.html" />
    <link rel="import" href="/templates/ingameUiHeader/ingameUiHeader.html" />

    <script type="text/javascript" src="/JS/debug.js"></script>
    <script type="text/javascript" src="CustomPanel.js"></script>
</head>

<body class="border-box">
    <ingamepanel-skydecktwitch>
        <ingame-ui id="SkyDeckTwitch" panel-id="PANEL_SKYDECK_TWITCH" title="Live Twitch Chat" class="ingameUiFrame panelInvisible" content-fit="true" min-width="300" min-height="400">
            <!-- Setup screen -->
            <div id="SetupScreen">
                <div id="SetupTitle">TWITCH CHAT</div>
                <div id="SetupForm">
                    <label for="ChannelInput">Channel Name</label>
                    <input type="text" id="ChannelInput" placeholder="your_channel_name" />
                    <button id="ConnectBtn">CONNECT</button>
                </div>
                <div id="ConfigHint">Edit config.json to set channel</div>
            </div>
            <!-- Chat display -->
            <div id="ChatWrap">
                <div id="ChatHeader">
                    <span id="ChatChannelName"></span>
                    <div id="ChatControls">
                        <span id="VRModeLabel" class="vr-label" title="Desktop Mode">DT</span>
                        <button id="TransBgBtn" class="ctrl-btn" title="Toggle transparent background">T</button>
                        <button id="SettingsBtn" class="ctrl-btn" title="Font Settings">S</button>
                        <button id="FontDownBtn" class="ctrl-btn" title="Decrease chat font">A-</button>
                        <span id="FontSizeLabel">28</span>
                        <button id="FontUpBtn" class="ctrl-btn" title="Increase chat font">A+</button>
                        <button id="DisconnectBtn" class="ctrl-btn">X</button>
                    </div>
                </div>
                <!-- Settings panel -->
                <div id="SettingsPanel">
                    <div class="settings-row">
                        <span class="settings-label">Channel Name</span>
                        <div class="settings-controls">
                            <button class="ctrl-btn settings-btn" data-target="channel" data-dir="-1">-</button>
                            <span class="settings-value" id="ChannelFontValue">16</span>
                            <button class="ctrl-btn settings-btn" data-target="channel" data-dir="1">+</button>
                        </div>
                    </div>
                    <div class="settings-row">
                        <span class="settings-label">Chat Text</span>
                        <div class="settings-controls">
                            <button class="ctrl-btn settings-btn" data-target="chat" data-dir="-1">-</button>
                            <span class="settings-value" id="ChatFontValue">28</span>
                            <button class="ctrl-btn settings-btn" data-target="chat" data-dir="1">+</button>
                        </div>
                    </div>
                    <div class="settings-row">
                        <span class="settings-label">UI Controls</span>
                        <div class="settings-controls">
                            <button class="ctrl-btn settings-btn" data-target="ui" data-dir="-1">-</button>
                            <span class="settings-value" id="UIFontValue">12</span>
                            <button class="ctrl-btn settings-btn" data-target="ui" data-dir="1">+</button>
                        </div>
                    </div>
                    <div class="settings-row">
                        <span class="settings-label">Emote Size</span>
                        <div class="settings-controls">
                            <button class="ctrl-btn settings-btn" data-target="emote" data-dir="-1">-</button>
                            <span class="settings-value" id="EmoteSizeValue">28</span>
                            <button class="ctrl-btn settings-btn" data-target="emote" data-dir="1">+</button>
                        </div>
                    </div>
                    <hr class="settings-divider" />
                    <div class="settings-section-label">Colors</div>
                    <div class="settings-row">
                        <span class="settings-label">Channel Name</span>
                        <div class="settings-controls">
                            <button class="ctrl-btn settings-btn color-prev-btn" data-color-target="channel" data-dir="-1">&lt;</button>
                            <span class="color-preview" id="ChannelColorPreview"></span>
                            <button class="ctrl-btn settings-btn color-next-btn" data-color-target="channel" data-dir="1">&gt;</button>
                        </div>
                    </div>
                    <div class="settings-row">
                        <span class="settings-label">Chat Text</span>
                        <div class="settings-controls">
                            <button class="ctrl-btn settings-btn color-prev-btn" data-color-target="chat" data-dir="-1">&lt;</button>
                            <span class="color-preview" id="ChatColorPreview"></span>
                            <button class="ctrl-btn settings-btn color-next-btn" data-color-target="chat" data-dir="1">&gt;</button>
                        </div>
                    </div>
                    <div class="settings-row">
                        <span class="settings-label">Emote Labels</span>
                        <div class="settings-controls">
                            <button class="ctrl-btn settings-btn color-prev-btn" data-color-target="emote" data-dir="-1">&lt;</button>
                            <span class="color-preview" id="EmoteColorPreview"></span>
                            <button class="ctrl-btn settings-btn color-next-btn" data-color-target="emote" data-dir="1">&gt;</button>
                        </div>
                    </div>
                    <div class="settings-row">
                        <span class="settings-label">Twitch Name Colors</span>
                        <div class="settings-controls">
                            <button class="ctrl-btn toggle-btn on" id="TwitchColorToggle" title="Use Twitch username colors">ON</button>
                        </div>
                    </div>
                </div>
                <div id="ChatMessages"></div>
                <div id="ChatStatus">Connecting...</div>
            </div>
        </ingame-ui>
    </ingamepanel-skydecktwitch>
</body>
</html>
